server:
  port: 8080
  mode: debug  # debug | release | test

database:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  user: ${DB_USER:postgres}
  password: ${DB_PASSWORD:postgres}
  name: ${DB_NAME:education}
  max_open_conns: 100
  max_idle_conns: 10

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  db: 0

jwt:
  secret: ${JWT_SECRET:education-platform-secret-key-2026}
  access_expire: 7200   # seconds (2 hours)
  refresh_expire: 604800 # seconds (7 days)

minio:
  endpoint: ${MINIO_ENDPOINT:localhost:9000}
  access_key: ${MINIO_ACCESS_KEY:minioadmin}
  secret_key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:education}
  use_ssl: false

nats:
  url: ${NATS_URL:nats://localhost:4222}

log:
  level: debug   # debug | info | warn | error
  format: json   # json | console
